name: Build Storybook

on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]

jobs:
  next:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install native binaries (workaround for npm/cli#4828)
        run: |
          npm install @rollup/rollup-linux-x64-gnu
          rm -rf node_modules/lightningcss node_modules/.cache
          npm install lightningcss-linux-x64-gnu lightningcss

      - name: Build Storybook
        run: NODE_OPTIONS="--max-old-space-size=12288" npm run build-storybook
